name: Build and deploy Python app to Azure Web App - synth-speech-model

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v2
        with:
          python-version: '3.11'
          environment-file: environment.yml  # Provide path to your conda environment file

      - name: Create and activate conda environment
        run: |
          conda activate base  # Activate the base conda environment
          conda env create -f environment.yml  # Replace with the actual name of your conda environment file
          conda activate synth-speech-model-environment  # Replace with the actual name of your conda environment

      - name: Install dependencies
        run: |
          # If your dependencies are not specified in the conda environment file, you can install them here using pip
          # pip install -r requirements.txt

      # Optional: Add step to run tests here (PyTest, Django test suites, etc.)
      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v3
        with:
          name: python-app
          path: |
            release.zip
            !venv/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v3
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: unzip release.zip

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v2
        id: deploy-to-webapp
        with:
          app-name: 'synth-speech-model'
          slot-name: 'Production'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_33A06CA20F7A42EB92B91B8325C884B2 }}
